name: Upload Docs to OpenAI Vector Store

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  push:
    branches: [main]
    paths:
      - 'website/docs/**'
  workflow_dispatch:

concurrency:
  group: upload-docs-to-openai
  cancel-in-progress: false

jobs:
  upload-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Merge markdown files
        run: |
          find website/docs \( -name '*.md' -o -name '*.mdx' \) -exec cat {} + > appsmith-docs.md
          echo "Merged docs file created"

      - name: Check file size
        run: |
          filesize=$(stat -c%s "appsmith-docs.md")
          echo "File size: $filesize bytes"
          max_size=$((512 * 1024 * 1024))
          if [ "$filesize" -gt "$max_size" ]; then
            echo "ERROR: File exceeds 512MB limit"
            exit 1
          fi

      - name: Upload merged file to OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Uploading file to OpenAI..."
          upload_response=$(curl -sS --http1.1 -X POST \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -F "purpose=assistants" \
            -F "file=@appsmith-docs.md" \
            "https://api.openai.com/v1/files")

          FILE_ID=$(echo "$upload_response" | jq -r '.id')
          if [ "$FILE_ID" = "null" ] || [ -z "$FILE_ID" ]; then
            echo "ERROR: File upload failed"
            echo "$upload_response"
            exit 1
          fi
          echo "Uploaded file ID: $FILE_ID"
          echo "FILE_ID=$FILE_ID" >> "$GITHUB_ENV"

      - name: Attach file to vector store
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VECTOR_STORE_ID: ${{ secrets.OPENAI_VECTOR_STORE_ID }}
        run: |
          echo "Validating vector store..."
          vs_validate=$(curl -fsS --http1.1 "https://api.openai.com/v1/vector_stores/$VECTOR_STORE_ID" \
            -H "Authorization: Bearer $OPENAI_API_KEY")
          echo "$vs_validate" | jq .

          echo "Attaching file to vector store..."
          attach_response=$(curl -sS --http1.1 -X POST \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"file_id\":\"$FILE_ID\"}" \
            "https://api.openai.com/v1/vector_stores/$VECTOR_STORE_ID/files")

          echo "$attach_response"

          status=$(echo "$attach_response" | jq -r '.status')
          if [ "$status" = "null" ] || [ -z "$status" ]; then
            echo "ERROR: Attach failed. Full response:"
            echo "$attach_response"
            exit 1
          fi

          echo "Attach status: $status"

      - name: Wait for vector store processing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VECTOR_STORE_ID: ${{ secrets.OPENAI_VECTOR_STORE_ID }}
        run: |
          echo "Waiting for file $FILE_ID to finish processing in vector store..."
          for i in $(seq 1 60); do
            file_response=$(curl -sS --http1.1 \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              "https://api.openai.com/v1/vector_stores/$VECTOR_STORE_ID/files/$FILE_ID")

            file_status=$(echo "$file_response" | jq -r '.status')
            echo "Attempt $i: status=$file_status"

            if [ "$file_status" = "completed" ]; then
              echo "File ingestion complete"
              exit 0
            elif [ "$file_status" = "failed" ] || [ "$file_status" = "cancelled" ]; then
              echo "ERROR: File ingestion $file_status"
              echo "$file_response"
              exit 1
            fi

            sleep 10
          done
          echo "ERROR: Timed out waiting for file ingestion"
          exit 1

